---
name: Run tests
on:
  pull_request: ~
  push:
    branches:
      - main
permissions:
  contents: read

env:
  # renovate: datasource=git-refs-master packageName=https://github.com/neovim/neovim
  NEOVIM_NIGHTLY_COMMIT: 7945732ed7bb211f91112292a13b51fc3182599b
  # renovate: datasource=github-releases depName=neovim/neovim
  NEOVIM_VERSION: v0.12.0

jobs:
  build-neovim-nightly:
    runs-on: ubuntu-24.04
    steps:
      - uses: mikavilpas/neovim-action/build-nightly@4f1c9a2235ee7428930602c0ba3e4f20377b61d8 # v3.3.0
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}

  build:
    name: "Test (neovim ${{ matrix.neovim_version }})"
    needs: build-neovim-nightly
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        neovim_version: ["nightly", "stable"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          # https://github.com/pnpm/action-setup?tab=readme-ov-file#use-cache-to-reduce-installation-time
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install

      - if: matrix.neovim_version == 'nightly'
        uses: mikavilpas/neovim-action/restore-nightly@4f1c9a2235ee7428930602c0ba3e4f20377b61d8 # v3.3.0
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}

      - uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1
        if: matrix.neovim_version != 'nightly'
        with:
          neovim: true
          version: ${{ env.NEOVIM_VERSION }}

      - working-directory: integration-tests
        name: Prepare Neovim for e2e tests
        run: pnpm tui neovim prepare

      # need to work around https://github.com/cypress-io/github-action/issues/1246
      - run: pnpm --filter integration-tests exec cypress install

      - name: Cypress test
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7
        with:
          install: false
          command: pnpm tui run

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        # add the line below to store screenshots only on failures
        # if: failure()
        if: failure()
        with:
          name: cypress-screenshots
          path: integration-tests/cypress/screenshots
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`

  ci:
    name: ci
    if: ${{ always() }}
    needs:
      - build-neovim-nightly
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Verify all required jobs succeeded
        if: >-
          ${{
            contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped')
          }}
        run: |
          echo "One or more required jobs did not succeed."
          exit 1
